name: Update Badges

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日深夜0時に実行
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch follower/star counts
        id: stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(gh api graphql -f query='
            query {
              user(login: "${{ github.repository_owner }}") {
                followers { totalCount }
                repositories(first: 100, ownerAffiliations: OWNER, isFork: false, privacy: PUBLIC) {
                  nodes { stargazerCount }
                }
              }
            }' --jq '{followers: .data.user.followers.totalCount, stars: ([.data.user.repositories.nodes[].stargazerCount] | add)}')
          echo "followers=$(echo "$RESULT" | jq -r .followers)" >> "$GITHUB_OUTPUT"
          echo "stars=$(echo "$RESULT" | jq -r .stars)" >> "$GITHUB_OUTPUT"

      - name: Update README badges
        env:
          FOLLOWERS: ${{ steps.stats.outputs.followers }}
          STARS: ${{ steps.stats.outputs.stars }}
        run: |
          sed -i -E "s#badge/followers-[0-9]+-181717#badge/followers-${FOLLOWERS}-181717#" README.md
          sed -i -E "s#Stars_Earned-[0-9]+-F1E05A#Stars_Earned-${STARS}-F1E05A#" README.md

      # 統計画像は配信元が41時間キャッシュを強制するため、URLを日付で変えて取り直させる
      - name: Refresh stats image URLs
        run: |
          sed -i -E "s#&v=[0-9]{8}#\&v=$(date -u +%Y%m%d)#g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update badges and refresh stats images"
          git push
